<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — ClaimIQ</title>
  <meta name="description" content="Sign in to ClaimIQ — AI-powered insurance claims processing with full transparency." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50: '#eff6ff', 100: '#dbeafe', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 900: '#1e3a8a' },
            accent: { 400: '#34d399', 500: '#10b981', 600: '#059669' },
            surface: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 800: '#1e293b', 900: '#0f172a' }
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Inter', sans-serif; }

    .gradient-hero {
      background: linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 20%, #ddd6fe 40%, #fce8f4 60%, #ffe4e6 80%, #fef3c7 100%);
    }

    .mesh-bg {
      background-image: radial-gradient(at 40% 20%, hsla(228, 80%, 80%, 0.2) 0px, transparent 50%),
        radial-gradient(at 80% 0%, hsla(189, 80%, 80%, 0.15) 0px, transparent 50%),
        radial-gradient(at 0% 50%, hsla(270, 80%, 85%, 0.15) 0px, transparent 50%);
    }

    .glass-strong {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    }

    .input-focus:focus {
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }

    .glow {
      box-shadow: 0 0 30px rgba(99, 102, 241, 0.25);
    }
  </style>
</head>

<body class="gradient-hero min-h-screen flex items-center justify-center mesh-bg px-6">

  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-10">
      <a href="index.html" class="inline-flex items-center gap-3 mb-6">
        <div
          class="w-11 h-11 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center text-white font-bold text-lg shadow-lg glow">
          ⚡
        </div>
        <span class="text-2xl font-extrabold text-gray-800">
          Claim<span class="text-indigo-500">IQ</span>
        </span>
      </a>
      <h1 class="text-2xl font-bold text-gray-800 mb-2">Welcome back</h1>
      <p class="text-gray-500 text-sm">Sign in to your account to continue</p>
    </div>

    <!-- Login Card -->
    <div class="glass-strong rounded-3xl p-8">
      <div id="loginError" class="hidden bg-red-100 border border-red-300 text-red-600 rounded-xl px-4 py-3 text-sm mb-6"></div>

      <div class="space-y-5">
        <div>
          <label class="block text-sm font-semibold text-gray-600 mb-2">Email Address</label>
          <input id="email" type="email" placeholder="you@company.com"
            class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3.5 text-gray-800 placeholder-gray-400 focus:outline-none focus:border-indigo-500 input-focus transition" />
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-600 mb-2">Password</label>
          <input id="password" type="password" placeholder="••••••••"
            class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3.5 text-gray-800 placeholder-gray-400 focus:outline-none focus:border-indigo-500 input-focus transition"
            onkeydown="if(event.key==='Enter') doLogin()" />
        </div>
        <button onclick="doLogin()" id="loginBtn"
          class="w-full bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-400 hover:to-purple-500 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-indigo-500/25 text-sm">
          Sign In →
        </button>
      </div>

      <div class="mt-6 text-center text-sm text-gray-500">
        Don't have an account? <a href="register.html" class="text-indigo-500 hover:text-indigo-400 font-semibold">Create one</a>
      </div>
    </div>

    <!-- Demo accounts -->
    <div class="mt-8 glass-strong rounded-2xl p-5">
      <div class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-3">Quick Demo Login</div>
      <div class="space-y-2">
        <button onclick="quickLogin('john@demo.com','Demo@123')" class="w-full flex items-center gap-3 bg-white hover:bg-indigo-50 border border-gray-200 rounded-xl px-4 py-3 transition text-left">
          <span class="w-8 h-8 bg-emerald-100 rounded-lg flex items-center justify-center text-sm">👤</span>
          <div class="flex-1 min-w-0"><div class="text-sm font-medium text-gray-800">John Doe</div><div class="text-xs text-gray-400">john@demo.com · Clean claims</div></div>
          <span class="text-emerald-500 text-xs font-bold">✅</span>
        </button>
        <button onclick="quickLogin('rahul@demo.com','Demo@123')" class="w-full flex items-center gap-3 bg-white hover:bg-indigo-50 border border-gray-200 rounded-xl px-4 py-3 transition text-left">
          <span class="w-8 h-8 bg-amber-100 rounded-lg flex items-center justify-center text-sm">👤</span>
          <div class="flex-1 min-w-0"><div class="text-sm font-medium text-gray-800">Rahul Verma</div><div class="text-xs text-gray-400">rahul@demo.com · Suspicious claim</div></div>
          <span class="text-amber-500 text-xs font-bold">⚠️</span>
        </button>
        <button onclick="quickLogin('amit@demo.com','Demo@123')" class="w-full flex items-center gap-3 bg-white hover:bg-indigo-50 border border-gray-200 rounded-xl px-4 py-3 transition text-left">
          <span class="w-8 h-8 bg-red-100 rounded-lg flex items-center justify-center text-sm">👤</span>
          <div class="flex-1 min-w-0"><div class="text-sm font-medium text-gray-800">Amit Kumar</div><div class="text-xs text-gray-400">amit@demo.com · Fraud scenario</div></div>
          <span class="text-red-500 text-xs font-bold">❌</span>
        </button>
        <button onclick="quickLogin('admin@claimiq.com','Admin@123')" class="w-full flex items-center gap-3 bg-white hover:bg-indigo-50 border border-gray-200 rounded-xl px-4 py-3 transition text-left">
          <span class="w-8 h-8 bg-purple-100 rounded-lg flex items-center justify-center text-sm">🛡️</span>
          <div class="flex-1 min-w-0"><div class="text-sm font-medium text-gray-800">Admin</div><div class="text-xs text-gray-400">admin@claimiq.com · Dashboard</div></div>
          <span class="text-purple-500 text-xs font-bold">⚙️</span>
        </button>
      </div>
    </div>
  </div>

<script>
const API = 'http://localhost:8000';

function quickLogin(email, password) {
  document.getElementById('email').value = email;
  document.getElementById('password').value = password;
  doLogin();
}

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();
  const errBox = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');

  if (!email || !password) { errBox.textContent = 'Please enter email and password'; errBox.classList.remove('hidden'); return; }

  btn.textContent = 'Signing in...';
  btn.disabled = true;

  try {
    const form = new URLSearchParams();
    form.append('username', email);
    form.append('password', password);

    const res = await fetch(`${API}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: form,
    });
    const data = await res.json();

    if (!res.ok) {
      errBox.textContent = data.detail || 'Login failed';
      errBox.classList.remove('hidden');
      btn.textContent = 'Sign In →';
      btn.disabled = false;
      return;
    }

    localStorage.setItem('claimiq_token', data.access_token);
    localStorage.setItem('claimiq_user', JSON.stringify(data.user));

    // Route based on role
    if (data.user.role === 'admin') {
      window.location.href = 'dashboard.html';
    } else {
      window.location.href = 'portal.html';
    }
  } catch(e) {
    errBox.textContent = 'Server error — is the backend running?';
    errBox.classList.remove('hidden');
    btn.textContent = 'Sign In →';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
